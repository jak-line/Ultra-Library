<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <!-- ===== META ===== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ===== TITLE & ICON ===== -->
  <title>Ultra Library</title>
  <link rel="icon" type="image/png" href="img/icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- ===== STYLES ===== -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- ===== OVERLAYS ===== -->
  <div id="dim"></div>
  <div id="fade"></div>
  <div id="game-transition"></div>

  <!-- ===== CHANGELOG BUTTON ===== -->
  <button id="changelog-btn">📜</button>

  <!-- ===== INTRO ===== -->
  <div id="intro">
    <img id="ps2" src="img/ps2open.png" alt="">
    <img id="cd" src="img/cdgame.png" alt="">
    <div id="intro-bg"></div>

    <button id="skip-intro">PULAR</button>
    <p id="insert-text">Insira para iniciar</p>
  </div>

  <!-- ===== MAIN SCREEN ===== -->
  <main id="screen">

    <!-- TITLE -->
    <div id="title-container">
      <img id="title" src="img/title.png" alt="Ultra Library">
      <p id="subtitle">Emulação retrô direto no navegador</p>
    </div>

    <!-- FILTERS -->
    <div id="filters">
      <button class="filter-btn active" data-filter="all">TODOS</button>
      <button class="filter-btn" data-filter="nes">NES</button>
      <button class="filter-btn" data-filter="snes">SNES</button>
      <button class="filter-btn" data-filter="gb">GB</button>
      <button class="filter-btn" data-filter="gba">GBA</button>
      <button class="filter-btn" data-filter="n64">N64</button>
      <button class="filter-btn" data-filter="segaMD">MD</button>
    </div>

    <!-- CHANGELOG PANEL -->
    <div id="changelog">
      <h2>Atualizações</h2>
      <div id="changelog-content"></div>
    </div>

<!-- <div id="controls-ui">
       <button onclick="applyPreset('single')">1P</button>
       <button onclick="applyPreset('multiKeyboard')">2P</button>
     </div> -->

    <!-- GAME LIBRARY -->
    <div id="library"></div>

  </main>

  <!-- ===== GAME PLAYER ===== -->
  <div id="game">
    <div id="game-msg">
      <span class="loading-text">Carregando...</span>
      <span class="f5-text">Pressione F5 ou recarregue a página para voltar</span>
    </div>
  </div>

  <!-- ===== AUDIO ===== -->
  <audio id="bgm" src="audio/bgm.mp3" loop></audio>
  <audio id="cd-insert-sfx" src="audio/cdinsert.mp3"></audio>
  <audio id="cd-read" src="audio/discread.mp3"></audio>

  <!-- ===== SCRIPTS ===== -->
  <script src="js/roms.js"></script>
  <script src="js/games.js"></script>
  <script src="js/changelog.js"></script>
  <!-- <script src="js/controls.js"></script> -->
  <script src="js/emulator.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
